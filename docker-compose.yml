services:
  postgres:
    image: postgres:15-alpine
    container_name: dropout_db
    environment:
      POSTGRES_DB: dropout_predictor
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: password
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d dropout_predictor"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: dropout_app
    ports:
      - "5000:5000"
    environment:          
      DB_HOST: postgres   
      DB_PORT: "5432"     
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata: